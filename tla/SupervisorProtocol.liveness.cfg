\* Liveness model checking configuration for SupervisorProtocol.
\* Verifies recovery, convergence, and eventual config application.

SPECIFICATION Spec

CONSTANTS
    MaxConfigs = 2
    MaxCrashes = 2

INVARIANTS
    TypeOK
    PathConsistency
    NeverSignalDeadChild

PROPERTIES
    ConfigEventuallyApplied
    CrashEventuallyRecovered
    SupervisorAlwaysReturnsToIdle
