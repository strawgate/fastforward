\* TLC Model Checker Configuration — THOROUGH safety model (no ForceStop)
\*
\* Same as PipelineMachine.cfg but with larger constants for deeper exploration.
\* Use before merging to catch edge cases not covered by the fast config.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.thorough.cfg
\* Expected: ~several million states, several minutes
\*
\* NOTE: Do NOT use CONSTRAINT to bound state space — it silently breaks
\* liveness checking. Use model constants (this file) instead.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2", "s3"}
    MaxBatchesPerSource = 4

SYMMETRY Sources    \* {"s1","s2","s3"} are interchangeable — reduces state space

\* Safety invariants
INVARIANTS
    TypeOK
    NoDoubleComplete
    DrainCompleteness
    CheckpointOrderingInvariant
    CommittedNeverAheadOfAcked
    InFlightImpliesCreated
    AckedImpliesCreated

\* Temporal action properties (safe to check with safety-sized constants)
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    DrainMeansNoNewSending
