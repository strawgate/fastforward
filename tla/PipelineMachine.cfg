\* TLC Model Checker Configuration — FAST / SAFETY model (no ForceStop)
\*
\* Run: tlc MCPipelineMachine.tla -config PipelineMachine.cfg
\* Or via Toolbox: Open Spec -> MCPipelineMachine.tla, create model from this .cfg
\*
\* THREE MODELS TO RUN:
\*
\* Model 1 — Safety (normal path):
\*   Constants: Sources={"s1","s2"}, MaxBatchesPerSource=3
\*   Symmetry: {"s1","s2"} is a symmetry set
\*   Invariants: TypeOK, NoDoubleComplete, DrainCompleteness,
\*               CheckpointOrderingInvariant, CommittedNeverAheadOfAcked
\*   ForceStop: commented out in Next
\*   Expected: ~50K states, < 30s
\*
\* Model 2 — Liveness (normal path):
\*   Constants: Sources={"s1","s2"}, MaxBatchesPerSource=2
\*   Symmetry: {"s1","s2"} is a symmetry set
\*   Properties: EventualDrain, NoBatchLeftBehind, StoppedIsStable
\*   WARNING: liveness needs SMALL constants — TLC liveness is slow
\*   Expected: ~5K states, < 5 min
\*
\* Model 3 — Safety with ForceStop:
\*   Same as Model 1 but ForceStop enabled in Next, DrainCompleteness removed
\*   Expected: similar state space
\*
\* NOTE: Do NOT use CONSTRAINT to bound state space — it silently breaks
\* liveness checking. Use model constants (this file) instead.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2"}
    MaxBatchesPerSource = 3

SYMMETRY Sources    \* {"s1","s2"} are interchangeable — reduces state space

\* Safety invariants (Model 1 and Model 3)
INVARIANTS
    TypeOK
    NoDoubleComplete
    DrainCompleteness
    CheckpointOrderingInvariant
    CommittedNeverAheadOfAcked
    InFlightImpliesCreated
    AckedImpliesCreated

\* Temporal properties (Model 2 — use smaller constants)
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    EventualDrain
    NoBatchLeftBehind
    StoppedIsStable
    AllCreatedBatchesEventuallyAccountedFor
