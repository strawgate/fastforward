\* TLC Model Checker Configuration — NIGHTLY THOROUGH safety model.
\*
\* Deeper than PipelineMachine.thorough.cfg: larger source set and batches to
\* exercise more permutations of concurrent multi-source behavior.  Runs under
\* the nightly schedule only (see .github/workflows/nightly-testing.yml) — the
\* PR-time CI uses the smaller PipelineMachine.thorough.cfg (which lives in
\* ci.yml is no longer PR-run; PR CI sticks to safety+liveness+coverage).
\*
\* Run: java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla \
\*          -config PipelineMachine.nightly.thorough.cfg -workers auto
\* Expected: billions of generated states; runs to completion in roughly
\* 60–120 minutes on the nightly runner (120-min timeout configured).
\*
\* NOTE: Do NOT use CONSTRAINT to bound state space — prefer model constants.
\* CONSTRAINT silently breaks liveness checking (not relevant here since this
\* is a safety config, but the rule applies workspace-wide).

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2", "s3"}
    MaxBatchesPerSource = 4
    MaxNonTerminalHolds = 2

\* Safety invariants (same set as PipelineMachine.thorough.cfg)
INVARIANTS
    TypeOK
    NoDoubleComplete
    DrainCompleteness
    NoHeldWorkAfterStop
    QuiescenceHasNoSilentStrandedWork
    CheckpointOrderingInvariant
    UnresolvedWorkNotCommittedPast
    CheckpointNeverAheadOfTerminalizedPrefix
    CommittedNeverAheadOfCreated
    SentImpliesCreated
    InFlightImpliesCreated
    InFlightImpliesSent
    HeldImpliesInFlight
    RetriedImpliesSent
    PanickedImpliesSent
    HoldCountOnlyForSent
    AckedImpliesCreated
    AckedImpliesSent
    RejectedImpliesCreated
    RejectedImpliesSent
    AbandonedImpliesCreated
    AbandonedImpliesSent

\* Temporal action properties (safe to check with safety-sized constants)
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    HeldTransitionsDoNotCommit
    ForceStopAbandonsAllInFlight
    DrainMeansNoNewSending
