# logfwd example
# Use case: Apache logs to Elasticsearch
# Replace paths/endpoints with values for your environment.

input:
  type: file
  path: /var/log/apache2/*.log
  format: raw
  poll_interval_ms: 50
  read_buf_size: 262144
  per_file_read_budget_bytes: 262144

transform: |
  SELECT * FROM logs

output:
  type: elasticsearch
  endpoint: https://elasticsearch:9200
  index: apache-logs-%Y.%m.%d

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
