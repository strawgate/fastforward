<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>logfwd</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
:root {
  --bg:#0a0d12; --card:#12151c; --card2:#181d28; --border:#1c2233; --border2:#252d40;
  --accent:#3b82f6; --ok:#10b981; --warn:#f59e0b; --err:#ef4444; --purple:#a78bfa;
  --t1:#e2e8f0; --t2:#94a3b8; --t3:#64748b; --t4:#475569;
  --mono:'SF Mono','Cascadia Code','Fira Code','Menlo',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.4}

/* Bar */
.bar{display:flex;align-items:center;gap:14px;padding:8px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.bar h1{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill .dot{width:7px;height:7px;border-radius:50%}
.pill-ok{background:rgba(16,185,129,.08);color:var(--ok)}.pill-ok .dot{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.pill-err{background:rgba(239,68,68,.08);color:var(--err)}.pill-err .dot{background:var(--err);box-shadow:0 0 6px var(--err)}
.pill-off{background:rgba(100,116,139,.08);color:var(--t4)}.pill-off .dot{background:var(--t4)}
.bar-meta{font-size:11px;color:var(--t4);font-family:var(--mono)}

main{max-width:1200px;margin:0 auto;padding:16px 20px}
.heading{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin:16px 0 8px}
.heading:first-child{margin-top:0}

/* System info - compact grid */
.sys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;margin-bottom:16px}
.sys-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.sys-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--t4)}
.sys-val{font-size:12px;font-family:var(--mono);color:var(--t2);font-variant-numeric:tabular-nums}

/* Charts */
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;position:relative}
.chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.chart-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);font-weight:600}
.chart-val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;color:var(--t1);text-align:right}
.chart-val .u{font-size:10px;color:var(--t3);font-weight:400;margin-left:2px}
.chart-val .lim{font-size:10px;color:var(--t4);font-weight:400;margin-left:4px}
canvas.ch{width:100%;height:120px;display:block;border-radius:4px}

/* Pipeline */
.pipe-flow{display:flex;align-items:stretch;gap:2px;padding:4px 0;overflow-x:auto}
.pipe-conn{display:flex;align-items:center;padding:0 3px;color:var(--t4)}
.pipe-conn svg{width:28px;height:14px}
.pipe-conn line{stroke:var(--border2);stroke-width:1.5}
.pipe-conn polygon{fill:var(--border2)}
.pn{flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s}
.pn:hover{border-color:var(--t4);background:var(--card2)}
.pn.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.pn-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.pn-name{font-size:13px;font-weight:600;margin-bottom:5px}
.pn-row{display:flex;justify-content:space-between;font-size:11px;line-height:1.5;font-variant-numeric:tabular-nums}
.pn-row span{color:var(--t4)}.pn-row b{color:var(--t2);font-weight:500;font-family:var(--mono)}
.inp .pn-type{color:var(--ok)}.inp{border-left:3px solid var(--ok)}
.xfm .pn-type{color:var(--accent)}.xfm{border-left:3px solid var(--accent)}
.out .pn-type{color:var(--purple)}.out{border-left:3px solid var(--purple)}

/* Inspector panel */
.inspector{background:var(--card2);border:1px solid var(--accent);border-radius:var(--r);margin:8px 0 16px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.insp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.insp-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--accent)}
.insp-close{background:none;border:1px solid var(--border);border-radius:4px;color:var(--t3);font-size:11px;padding:2px 8px;cursor:pointer}
.insp-close:hover{color:var(--t1);border-color:var(--t3)}
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.insp-kv .ik-l{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t4)}
.insp-kv .ik-v{font-size:13px;font-family:var(--mono);color:var(--t2);font-variant-numeric:tabular-nums}
.sql-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font:12px/1.5 var(--mono);color:#79c0ff;white-space:pre-wrap;margin-bottom:10px}

/* Config */
.yaml{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;font:12px/1.6 var(--mono);white-space:pre-wrap;overflow:auto;max-height:40vh;color:var(--t2)}
.cfg-src{font-size:11px;color:var(--t4);margin-bottom:6px}
.cfg-src b{color:var(--t3);font-weight:500;font-family:var(--mono)}

@media(max-width:1000px){.chart-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}.sys-grid{grid-template-columns:1fr 1fr}.pipe-flow{flex-direction:column}}
</style>
</head>

<body x-data="app()" x-init="start()">

<div class="bar">
  <h1>logfwd</h1>
  <div :class="'pill '+(connected?(totalErrors>0?'pill-err':'pill-ok'):'pill-off')">
    <span class="dot"></span>
    <span x-text="connected?(totalErrors>0?totalErrors+' errors':'healthy'):'disconnected'"></span>
  </div>
  <div class="spacer"></div>
  <span class="bar-meta" x-text="'v'+(sys.version||'?')+' \u00b7 '+fmtDur(sys.uptime_seconds)"></span>
</div>

<main>

<!-- System -->
<div class="heading">System</div>
<div class="sys-grid" x-show="sys.hostname||sys.pid">
  <template x-for="s in sysItems" :key="s[0]">
    <div class="sys-item"><div class="sys-label" x-text="s[0]"></div><div class="sys-val" x-text="s[1]"></div></div>
  </template>
</div>

<!-- Metrics -->
<div class="heading">Metrics</div>
<div class="chart-grid">
  <template x-for="m in chartDefs" :key="m.id">
    <div class="chart-card">
      <div class="chart-head">
        <span class="chart-label" x-text="m.label"></span>
        <span class="chart-val" x-html="chartVals[m.id]||'&ndash;'"></span>
      </div>
      <canvas class="ch" :id="'ch_'+m.id"></canvas>
    </div>
  </template>
</div>

<!-- Pipelines -->
<template x-for="(p,pi) in pipes" :key="p.name">
<div>
  <div class="heading" x-text="'Pipeline: '+p.name"></div>
  <div class="pipe-flow">
    <template x-for="(inp,ii) in p.inputs" :key="inp.name">
      <div style="display:contents">
        <div class="pipe-conn" x-show="ii>0"><svg viewBox="0 0 28 14"><line x1="0" y1="7" x2="20" y2="7"/><polygon points="20,3 28,7 20,11"/></svg></div>
        <div class="pn inp" :class="sel===pi+'i'+ii&&'sel'" @click="pick(pi+'i'+ii,'input',inp)">
          <div class="pn-type">Input</div>
          <div class="pn-name" x-text="inp.name"></div>
          <div class="pn-row"><span>lines</span><b x-text="fmt(inp.lines_total)"></b></div>
          <div class="pn-row"><span>bytes</span><b x-text="fmtB(inp.bytes_total)"></b></div>
          <div class="pn-row"><span>rate</span><b x-text="cRate(inp,'lines_total')"></b></div>
        </div>
      </div>
    </template>
    <div class="pipe-conn"><svg viewBox="0 0 28 14"><line x1="0" y1="7" x2="20" y2="7"/><polygon points="20,3 28,7 20,11"/></svg></div>
    <div class="pn xfm" :class="sel===pi+'t'&&'sel'" @click="pick(pi+'t','transform',{sql:p.transform.sql,lines_in:p.transform.lines_in,lines_out:p.transform.lines_out,drop:p.transform.filter_drop_rate})">
      <div class="pn-type">Transform</div>
      <div class="pn-name">SQL</div>
      <div class="pn-row"><span>in</span><b x-text="fmt(p.transform.lines_in)"></b></div>
      <div class="pn-row"><span>out</span><b x-text="fmt(p.transform.lines_out)"></b></div>
      <div class="pn-row"><span>drop</span><b x-text="(p.transform.filter_drop_rate*100).toFixed(1)+'%'" :style="p.transform.filter_drop_rate>.05&&'color:var(--warn)'"></b></div>
    </div>
    <div class="pipe-conn"><svg viewBox="0 0 28 14"><line x1="0" y1="7" x2="20" y2="7"/><polygon points="20,3 28,7 20,11"/></svg></div>
    <template x-for="(out,oi) in p.outputs" :key="out.name">
      <div style="display:contents">
        <div class="pipe-conn" x-show="oi>0"><svg viewBox="0 0 28 14"><line x1="0" y1="7" x2="20" y2="7"/><polygon points="20,3 28,7 20,11"/></svg></div>
        <div class="pn out" :class="sel===pi+'o'+oi&&'sel'" @click="pick(pi+'o'+oi,'output',out)">
          <div class="pn-type">Output</div>
          <div class="pn-name" x-text="out.name"></div>
          <div class="pn-row"><span>lines</span><b x-text="fmt(out.lines_total)"></b></div>
          <div class="pn-row"><span>bytes</span><b x-text="fmtB(out.bytes_total)"></b></div>
          <div class="pn-row"><span>errors</span><b x-text="out.errors" :style="out.errors>0&&'color:var(--err)'"></b></div>
        </div>
      </div>
    </template>
  </div>
  <!-- Inspector -->
  <template x-if="selData&&sel&&sel.startsWith(String(pi))">
    <div class="inspector" x-transition.opacity>
      <div class="insp-header">
        <span class="insp-title" x-text="selType+' \u2014 '+(selData.name||'SQL')"></span>
        <button class="insp-close" @click="sel=null;selData=null">&times; close</button>
      </div>
      <template x-if="selType==='transform'">
        <div>
          <div class="sql-box" x-text="selData.sql||'SELECT * FROM logs'"></div>
          <div class="insp-grid">
            <div class="insp-kv"><div class="ik-l">Lines In</div><div class="ik-v" x-text="fmt(selData.lines_in)"></div></div>
            <div class="insp-kv"><div class="ik-l">Lines Out</div><div class="ik-v" x-text="fmt(selData.lines_out)"></div></div>
            <div class="insp-kv"><div class="ik-l">Drop Rate</div><div class="ik-v" x-text="(selData.drop*100).toFixed(1)+'%'"></div></div>
          </div>
        </div>
      </template>
      <template x-if="selType==='input'">
        <div class="insp-grid">
          <div class="insp-kv"><div class="ik-l">Name</div><div class="ik-v" x-text="selData.name"></div></div>
          <div class="insp-kv"><div class="ik-l">Type</div><div class="ik-v" x-text="selData.type"></div></div>
          <div class="insp-kv"><div class="ik-l">Lines</div><div class="ik-v" x-text="fmt(selData.lines_total)"></div></div>
          <div class="insp-kv"><div class="ik-l">Bytes</div><div class="ik-v" x-text="fmtB(selData.bytes_total)"></div></div>
          <div class="insp-kv"><div class="ik-l">Errors</div><div class="ik-v" x-text="selData.errors"></div></div>
        </div>
      </template>
      <template x-if="selType==='output'">
        <div class="insp-grid">
          <div class="insp-kv"><div class="ik-l">Name</div><div class="ik-v" x-text="selData.name"></div></div>
          <div class="insp-kv"><div class="ik-l">Type</div><div class="ik-v" x-text="selData.type"></div></div>
          <div class="insp-kv"><div class="ik-l">Lines</div><div class="ik-v" x-text="fmt(selData.lines_total)"></div></div>
          <div class="insp-kv"><div class="ik-l">Bytes</div><div class="ik-v" x-text="fmtB(selData.bytes_total)"></div></div>
          <div class="insp-kv"><div class="ik-l">Errors</div><div class="ik-v" x-text="selData.errors" :style="selData.errors>0&&'color:var(--err)'"></div></div>
        </div>
      </template>
    </div>
  </template>
</div>
</template>

<!-- Config -->
<div class="heading">Config</div>
<div style="margin-bottom:16px">
  <div class="cfg-src" x-show="cfgPath">Source: <b x-text="cfgPath"></b></div>
  <div class="yaml" x-html="cfgHtml||'loading\u2026'"></div>
</div>

</main>

<script>
function app(){
var MAX_AGE=5*60*1000,POLL=2000;

// Ring buffer
function Ring(n){this.d=[];this.n=n}
Ring.prototype.push=function(v){this.d.push(v);if(this.d.length>this.n)this.d.shift()};
Ring.prototype.arr=function(){return this.d};

// Chart engine - proper charts with axes
var rings={};
function ring(id){if(!rings[id])rings[id]=new Ring(150);return rings[id]}

function drawChart(id,color,fmtY){
  var c=document.getElementById('ch_'+id);if(!c||!c.offsetWidth)return;
  var ctx=c.getContext('2d'),dpr=devicePixelRatio||1,w=c.offsetWidth,h=c.offsetHeight;
  c.width=w*dpr;c.height=h*dpr;ctx.scale(dpr,dpr);
  var PL=40,PR=6,PB=16,PT=4,cw=w-PL-PR,ch=h-PT-PB;
  var now=Date.now(),raw=ring(id).arr();
  var data=[];for(var i=0;i<raw.length;i++)if(raw[i].t>=now-MAX_AGE)data.push(raw[i]);
  // Background
  ctx.fillStyle='#0c0f16';ctx.fillRect(0,0,w,h);
  if(data.length<2){ctx.fillStyle='#374151';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('waiting\u2026',w/2,h/2);return}
  var vals=data.map(function(d){return d.v}),mn=0,mx=Math.max.apply(null,vals)*1.2;
  if(mx<.001)mx=1;if(mx<=mn)mx=mn+1;
  // Window: right edge = now, left edge grows with data age. Min 10s.
  var age=now-data[0].t,win=Math.max(10000,Math.min(age,MAX_AGE)),t0=now-win;
  function tx(t){return PL+Math.max(0,((t-t0)/win)*cw)}
  function ty(v){return PT+ch-((v-mn)/(mx-mn))*ch}
  var mf='9px '+getComputedStyle(document.body).getPropertyValue('--mono');
  // Y grid + labels
  ctx.font=mf;ctx.textAlign='right';ctx.textBaseline='middle';
  for(var g=0;g<=3;g++){
    var f=g/3,gy=PT+ch-ch*f;
    ctx.strokeStyle='#1a1f2e';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(PL,gy);ctx.lineTo(w-PR,gy);ctx.stroke();
    ctx.fillStyle='#4b5563';ctx.fillText((fmtY||fmtC)(mn+(mx-mn)*f),PL-3,gy);
  }
  // X labels
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle='#4b5563';ctx.font=mf;
  [10,30,60,120,300].forEach(function(s){var x=tx(now-s*1000);if(x>PL+18&&x<w-PR-16)ctx.fillText(s<60?s+'s':Math.floor(s/60)+'m',x,PT+ch+2)});
  if(cw>60)ctx.fillText('now',PL+cw-10,PT+ch+2);
  // Line
  ctx.beginPath();
  for(var i=0;i<data.length;i++){var x=tx(data[i].t),y=Math.max(PT,Math.min(PT+ch,ty(data[i].v)));i?ctx.lineTo(x,y):ctx.moveTo(x,y)}
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  // Fill
  var last=tx(data[data.length-1].t),first=tx(data[0].t);
  ctx.lineTo(last,PT+ch);ctx.lineTo(first,PT+ch);ctx.closePath();
  var gr=ctx.createLinearGradient(0,PT,0,PT+ch);gr.addColorStop(0,color+'28');gr.addColorStop(1,color+'04');ctx.fillStyle=gr;ctx.fill();
}

// Formatters
function fmt(n){if(n==null)return'-';if(n>=1e9)return(n/1e9).toFixed(1)+'G';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(Math.round(n))}
function fmtC(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';if(n>=1)return n.toFixed(0);return n<.01?'0':n.toFixed(1)}
function fmtB(b){if(b==null||b===0)return'-';if(b>=1073741824)return(b/1073741824).toFixed(1)+' GB';if(b>=1048576)return(b/1048576).toFixed(1)+' MB';if(b>=1024)return(b/1024).toFixed(1)+' KB';return b+' B'}
function fmtBC(b){if(b>=1073741824)return(b/1073741824).toFixed(1)+'G';if(b>=1048576)return(b/1048576).toFixed(0)+'M';if(b>=1024)return(b/1024).toFixed(0)+'K';return Math.round(b)+''}
function fmtDur(s){if(s==null)return'';if(s>=86400)return Math.floor(s/86400)+'d '+Math.floor((s%86400)/3600)+'h';if(s>=3600)return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';if(s>=60)return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';return s+'s'}
function hlYaml(y){var e=document.createElement('div');e.textContent=y;var s=e.innerHTML;
  s=s.replace(/(#.*)$/gm,'<i style="color:var(--t4)">$1</i>');
  s=s.replace(/^(\s*)([\w._-]+)(:)/gm,'$1<span style="color:var(--accent)">$2</span>$3');
  s=s.replace(/:\s+(\d+(?:\.\d+)?)\s*$/gm,': <span style="color:var(--warn)">$1</span>');
  s=s.replace(/:\s+(true|false)\s*$/gm,': <span style="color:var(--warn)">$1</span>');
  return s;}

// Rate tracking with EMA
var prevSnap={},prevTime=null,ema={};
function snapRate(k,v){var now=Date.now(),p=prevSnap[k],dt=prevTime?(now-prevTime)/1000:0;prevSnap[k]=v;if(p==null||dt<=0)return null;var r=Math.max(0,(v-p)/dt);ema[k]=ema[k]==null?r:ema[k]*.7+r*.3;return ema[k]}

var chartDefs=[
  {id:'lps',label:'Lines / sec',color:'#3b82f6',fv:fmtC},
  {id:'bps',label:'Input Bytes',color:'#8b5cf6',fv:fmtBC},
  {id:'err',label:'Errors / sec',color:'#ef4444',fv:fmtC},
  {id:'cpu',label:'Process CPU',color:'#f59e0b',fv:fmtC},
  {id:'rss',label:'Memory (RSS)',color:'#10b981',fv:fmtBC},
  {id:'fds',label:'File Descriptors',color:'#06b6d4',fv:fmtC},
];

return {
  connected:false,sys:{},pipes:[],sel:null,selData:null,selType:'',
  chartDefs:chartDefs,chartVals:{},totalErrors:0,
  cfgPath:'',cfgHtml:null,
  fmt:fmt,fmtB:fmtB,fmtDur:fmtDur,

  get sysItems(){
    var s=this.sys,r=[];
    if(s.hostname)r.push(['Hostname',s.hostname]);
    if(s.os)r.push(['OS',s.os]);
    if(s.arch)r.push(['Arch',s.arch]);
    if(s.cpu_count)r.push(['CPU',s.cpu_count+' cores'+(s.global_cpu_percent!=null?' \u00b7 '+s.global_cpu_percent.toFixed(0)+'% system':'')]);
    if(s.total_memory_bytes)r.push(['Memory',fmtB(s.used_memory_bytes||0)+' / '+fmtB(s.total_memory_bytes)+' used']);
    if(s.total_swap_bytes>0)r.push(['Swap',fmtB(s.used_swap_bytes||0)+' / '+fmtB(s.total_swap_bytes)]);
    if(s.cgroup_memory_limit)r.push(['cgroup limit',fmtB(s.cgroup_memory_limit)]);
    if(s.pid)r.push(['PID',String(s.pid)]);
    return r;
  },

  pick(id,type,data){if(this.sel===id){this.sel=null;this.selData=null}else{this.sel=id;this.selType=type;this.selData=data}},

  cRate(obj,f){var k='c_'+(obj.name||'?')+'_'+f,v=snapRate(k,obj[f]||0);return v!=null?fmt(v)+'/s':'-'},

  start(){var self=this;this.poll();setInterval(function(){self.poll()},POLL)},

  poll(){
    var self=this;
    Promise.all([
      fetch('/api/pipelines').then(function(r){return r.json()}),
      fetch('/api/system').then(function(r){return r.json()}).catch(function(){return null})
    ]).then(function(r){
      self.connected=true;
      if(r[1])self.sys=r[1];
      if(r[0]&&r[0].pipelines)self.pipes=r[0].pipelines;
      self.updateMetrics(r[0],r[1]);
      prevTime=Date.now();
      if(!self.cfgHtml)self.loadConfig();
      self.$nextTick(function(){chartDefs.forEach(function(m){drawChart(m.id,m.color,m.fv)})});
    }).catch(function(){self.connected=false});
  },

  updateMetrics(pipe,sys){
    var cv=this.chartVals;
    if(pipe&&pipe.pipelines){
      var tl=0,tb=0,te=0;
      pipe.pipelines.forEach(function(p){tl+=p.transform.lines_in||0;p.inputs.forEach(function(i){tb+=i.bytes_total||0});p.outputs.forEach(function(o){te+=o.errors||0})});
      this.totalErrors=te;
      var lps=snapRate('_l',tl),bps=snapRate('_b',tb),eps=snapRate('_e',te);
      if(lps!=null){ring('lps').push({t:Date.now(),v:lps});cv.lps=fmt(lps)+'<span class="u">/s</span>'}
      if(bps!=null){ring('bps').push({t:Date.now(),v:bps});cv.bps=fmtB(bps)+'<span class="u">/s</span>'}
      if(eps!=null){ring('err').push({t:Date.now(),v:eps});cv.err=fmt(eps)+'<span class="u">/s</span>'}
    }
    if(sys){
      if(sys.cpu_percent!=null){ring('cpu').push({t:Date.now(),v:sys.cpu_percent});cv.cpu=sys.cpu_percent.toFixed(1)+'<span class="u">%</span>'+(sys.cpu_count?'<span class="lim">/ '+sys.cpu_count+' cores</span>':'')}
      if(sys.rss_bytes){ring('rss').push({t:Date.now(),v:sys.rss_bytes});cv.rss=fmtB(sys.rss_bytes)+(sys.total_memory_bytes?'<span class="lim">/ '+fmtB(sys.total_memory_bytes)+'</span>':'')}
      if(sys.fd_count!=null){ring('fds').push({t:Date.now(),v:sys.fd_count});cv.fds=sys.fd_count+(sys.fd_limit!=null?'<span class="lim">/ '+fmt(sys.fd_limit)+'</span>':'')}
    }
  },

  loadConfig(){
    var self=this;
    fetch('/api/config').then(function(r){return r.json()}).then(function(d){
      self.cfgPath=d.path||'';self.cfgHtml=hlYaml(d.raw_yaml||'(no config)');
    }).catch(function(){self.cfgHtml='<span style="color:var(--t4)">could not load</span>'});
  }
};
}
</script>
</body>
</html>
