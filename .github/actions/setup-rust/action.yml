name: Setup Rust
description: Install stable Rust toolchain with clippy, rustfmt, and cargo cache.

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install mold linker
      if: runner.os == 'Linux'
      uses: rui314/setup-mold@v1

    - name: Configure mold as linker
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo 'CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang' >> "$GITHUB_ENV"
        echo 'CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=-C link-arg=-fuse-ld=mold -Dclippy::dbg_macro' >> "$GITHUB_ENV"

    - uses: Swatinem/rust-cache@v2
      with:
        save-if: ${{ github.ref == 'refs/heads/main' }}
