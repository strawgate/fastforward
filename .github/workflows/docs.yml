name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - "crates/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build mdBook
        run: mdbook build book

      - name: Build rustdoc (public API only)
        run: |
          cargo doc --no-deps \
            -p logfwd \
            -p logfwd-core \
            -p logfwd-config \
            -p logfwd-output \
            -p logfwd-transform
          cp -r target/doc book/book/api

      - name: Deploy to gh-pages
        run: |
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          # Copy docs into docs/ subdirectory (root is benchmark dashboard).
          rm -rf gh-pages-checkout/docs
          cp -r book/book gh-pages-checkout/docs

          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Deploy docs from ${GITHUB_SHA::8}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
