name: eBPF Capabilities

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ebpf-capabilities.yml"
      - "scripts/ci-ebpf-capabilities.sh"
      - "crates/logfwd-ebpf-proto/**"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/ebpf-capabilities.yml"
      - "scripts/ci-ebpf-capabilities.sh"
      - "crates/logfwd-ebpf-proto/**"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux-ebpf:
    name: Linux eBPF probe + tests
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install eBPF userspace tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bpftool

      - name: Test eBPF proto crate
        run: cargo test -p logfwd-ebpf-proto --all-targets

      - name: Check pipe-capture userspace loader builds
        run: cargo check --manifest-path crates/logfwd-ebpf-proto/pipe-capture/Cargo.toml

      - name: Probe runner eBPF capabilities
        run: scripts/ci-ebpf-capabilities.sh artifacts/ebpf-capabilities

      - name: Add probe summary
        if: always()
        run: cat artifacts/ebpf-capabilities/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eBPF capability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-capabilities-linux
          path: artifacts/ebpf-capabilities/
