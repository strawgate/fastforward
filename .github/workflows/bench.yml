name: Nightly Benchmarks

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # manual trigger

permissions:
  issues: write
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf and inferno
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-tools-$(uname -r) linux-tools-generic
          cargo install inferno

      - name: Build logfwd (release)
        run: cargo build --release -p logfwd

      - name: Build logfwd with dhat-heap (memory profiling)
        run: |
          cargo build --release --features dhat-heap -p logfwd
          cp target/release/logfwd target/release/logfwd-dhat

      - name: Rebuild logfwd without dhat (clean release binary)
        run: cargo build --release -p logfwd

      # ---------------------------------------------------------------
      # Criterion microbenchmarks (internal components)
      # ---------------------------------------------------------------

      - name: Run criterion microbenchmarks
        run: cargo bench -p logfwd-bench

      - name: Generate microbenchmark report
        run: cargo run -p logfwd-bench > micro_body.md

      # ---------------------------------------------------------------
      # Competitive benchmarks (downloads agents into temp dir)
      # ---------------------------------------------------------------

      - name: Run competitive benchmarks (Docker, 1 CPU / 1 GB per agent)
        run: >
          cargo run -p logfwd-competitive-bench --release --
          --lines 5000000 --docker --cpus 1 --memory 1g --markdown
          --profile ./profiles --dhat-binary ./target/release/logfwd-dhat
          > competitive_body.md
        env:
          LOGFWD: ./target/release/logfwd

      # ---------------------------------------------------------------
      # Upload profiles as artifacts
      # ---------------------------------------------------------------

      - name: Upload profiles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logfwd-profiles-${{ github.run_number }}
          path: |
            profiles/flamegraph.svg
            profiles/dhat-heap.json
            profiles/perf.data
          retention-days: 30

      # ---------------------------------------------------------------
      # Post results as GitHub issue
      # ---------------------------------------------------------------

      - name: Post issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)

          TITLE="Benchmark results ${DATE} (${COMMIT})"
          BODY="$(cat <<HEREDOC
          ## Benchmark Results — ${DATE}

          **Commit:** \`${COMMIT}\` on \`master\`
          **Runner:** \`ubuntu-latest\`

          ---

          $(cat competitive_body.md)

          ---

          $(cat micro_body.md)

          ---

          📊 CPU flamegraph and dhat-heap memory profile uploaded as workflow artifacts.

          <sub>Generated by [nightly bench workflow](.github/workflows/bench.yml)</sub>
          HEREDOC
          )"

          # Close previous nightly bench issues to avoid clutter.
          gh issue list --label benchmark --state open --json number -q '.[].number' | while read num; do
            gh issue close "$num" --comment "Superseded by new benchmark run." 2>/dev/null || true
          done

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label benchmark
