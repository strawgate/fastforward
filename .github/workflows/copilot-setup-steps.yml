name: "Copilot Setup Steps"
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Pre-compile dependencies
        # Compile all workspace test artifacts without running them.
        # This warms the Cargo compilation cache so agents skip the expensive
        # first-time DataFusion/Arrow build during their own `cargo test` runs.
        run: cargo test --no-run --workspace
