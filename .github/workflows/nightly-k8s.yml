name: Nightly K8s

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    name: KIND e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install KIND
        run: |
          KIND_VERSION="v0.24.0"
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run e2e test
        run: bash tests/e2e/run.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ github.run_id }}
          path: |
            tests/e2e/logs/
            /tmp/logfwd-e2e*/
          retention-days: 7

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Close previous nightly K8s issues to avoid clutter.
          gh issue list --label nightly-k8s --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new nightly run." 2>/dev/null || true
          done

          gh issue create \
            --title "Nightly K8s e2e test failed ($(date +%Y-%m-%d))" \
            --body "The KIND e2e test failed on the nightly run.

          Run: ${run_url}

          Please investigate." \
            --label "nightly-k8s"
