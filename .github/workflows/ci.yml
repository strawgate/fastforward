name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install tools
        run: |
          curl -sSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gunzip > /usr/local/bin/taplo && chmod +x /usr/local/bin/taplo
          DENY_URL=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/EmbarkStudios/cargo-deny/releases/latest) && \
            DENY_VER=$(basename "$DENY_URL") && \
            curl -sSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${DENY_VER}/cargo-deny-${DENY_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /tmp && \
            mv /tmp/cargo-deny-*/cargo-deny /usr/local/bin/

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Format check
        run: just fmt-check

      - name: Clippy
        run: just clippy

      - name: TOML check
        run: just toml-check

      - name: Dependency audit
        run: just deny

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit --ignore RUSTSEC-2024-0437

      - name: Typos
        uses: crate-ci/typos@v1

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Tests
        run: just test

  release-check:
    name: Release build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      # PRs: just check (fast). Master: full build + cache binaries for bench.
      - name: Release check
        if: github.ref != 'refs/heads/master'
        run: cargo check --release

      - name: Release build + cache bench binaries
        if: github.ref == 'refs/heads/master'
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3"
        run: |
          cargo build --release -p logfwd -p logfwd-competitive-bench
          cargo build --release --features dhat-heap -p logfwd
          cp target/release/logfwd target/release/logfwd-dhat
          cargo build --release -p logfwd
          mkdir -p cached-bench-binaries
          cp target/release/logfwd cached-bench-binaries/
          cp target/release/logfwd-dhat cached-bench-binaries/
          cp target/release/logfwd-competitive-bench cached-bench-binaries/

      - name: Cache bench binaries
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: cached-bench-binaries
          key: bench-binaries-${{ github.sha }}

  cross-compile-arm64:
    name: Cross-compile check (ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          key: aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Cross-compile check
        run: cargo check --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Tests
        run: cargo test

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint
