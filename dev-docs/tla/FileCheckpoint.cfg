\* TLC Configuration — SAFETY model
\*
\* Run: docker run --rm -v "$(pwd):/tla" -w /tla eclipse-temurin:21-jre \
\*      java -cp tla2tools.jar tlc2.TLC MCFileCheckpoint -config FileCheckpoint.cfg -workers auto

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    MaxLines = 4
    MaxCrashes = 1
    MaxRotations = 1
    BatchSize = 2

INVARIANTS
    TypeOK
    NoCorruption
    CheckpointBounded
    ReadOffsetBounded
    RotatedReadBounded
    InFlightInvariant
    PipelineConsistency
    NoEmitBeforeWrite

PROPERTIES
    CheckpointMonotonicity
