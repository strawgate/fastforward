[package]
name = "logfwd"
version = "0.1.0"
edition = "2024"

[features]
dhat-heap = ["dhat"]  # enable with: cargo run --release --features dhat-heap

[dependencies]
arrow = "54"
crossbeam-channel = "0.5"
datafusion = "45"
dhat = { version = "0.3", optional = true }
memchr = "2"
notify = "7"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
smallvec = { version = "1", features = ["union"] }
tiny_http = "0.12"
ureq = "3"
tokio = { version = "1", features = ["rt"] }
xxhash-rust = { version = "0.8", features = ["xxh32", "xxh64"] }
zstd = "0.13"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
rand = "0.9"
tempfile = "3"

[[bench]]
name = "pipeline"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
debug = true  # needed for flamegraphs and dhat to show source locations

[profile.test]
opt-level = 3
debug = true

[profile.bench]
inherits = "release"
