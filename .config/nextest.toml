[profile.default]
# Cap test concurrency. Tokio runtime threads are separately limited via
# TOKIO_WORKER_THREADS in the justfile, so total CPU is bounded.
# Override with: NEXTEST_TEST_THREADS=8 just test
test-threads = 2

[profile.ci]
# Only print failing tests inline; suppress the wall of passing test names.
status-level = "fail"
final-status-level = "fail"
failure-output = "immediate"
# CI runners have 4 vCPU; NEXTEST_TEST_THREADS env var overrides this.
test-threads = 4
